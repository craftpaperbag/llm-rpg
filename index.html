<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
  <title>100歩の黙示録</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- タイトル画面 -->
  <div id="title-screen" class="screen">
    <div class="title-content">
      <div class="title-meteor" aria-hidden="true"></div>
      <h1 class="title-main">100歩の黙示録</h1>
      <p class="title-sub">隕石衝突まで残り100歩</p>
      <div class="title-buttons">
        <button id="btn-new-game" class="title-btn">はじめから</button>
        <button id="btn-continue" class="title-btn" style="display:none">つづきから</button>
      </div>
      <p id="version-display" class="version-display"></p>
      <div id="unlocked-endings" class="endings-list" style="display:none">
        <p class="endings-label">解放済みエンディング</p>
        <div id="endings-grid"></div>
      </div>
    </div>
  </div>

  <!-- ゲーム画面 -->
  <div id="game-screen" class="screen" style="display:none">
    <header id="game-header">
      <div id="steps-display">
        <span id="meteor-icon" class="meteor-icon" aria-hidden="true">☄</span>
        <span id="steps-count">100</span>
        <span class="steps-slash">/</span>
        <span class="steps-max">100</span>
        <div id="steps-bar" role="progressbar" aria-label="残り歩数">
          <div id="steps-fill"></div>
        </div>
      </div>
      <button id="btn-map" class="map-btn" aria-label="マップ">▦</button>
      <button id="btn-mute" class="mute-btn" aria-label="ミュート切替">🔇</button>
    </header>

    <div id="meteor-shadow" class="meteor-shadow" aria-hidden="true">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="meteorGrad" cx="35%" cy="35%" r="65%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="55%" stop-color="#777777"/>
            <stop offset="100%" stop-color="#000000"/>
          </radialGradient>
        </defs>
        <circle cx="50" cy="50" r="42" class="meteor-circle"/>
      </svg>
    </div>

    <div id="impact-flash" class="impact-flash" aria-hidden="true"></div>
    <div id="noise-overlay" class="noise-overlay" aria-hidden="true"></div>

    <main id="scene-area">
      <div id="scene-fade" class="scene-fade">
        <div id="scene-header">
          <span id="scene-name" class="scene-name"></span>
        </div>
        <div id="scene-text" class="scene-text"></div>
      </div>
      <div id="choices-area" class="choices-area"></div>
      <div id="items-area" class="items-area">
        <div id="items-scroll" class="items-scroll"></div>
      </div>
    </main>
    <div id="item-toast-area" class="item-toast-area" aria-live="polite" aria-atomic="true"></div>
  </div>

  <!-- エンディング画面 -->
  <div id="ending-screen" class="screen" style="display:none">
    <div id="ending-content" class="ending-content">
      <div id="ending-category" class="ending-category"></div>
      <h2 id="ending-title" class="ending-title"></h2>
      <div id="ending-text" class="ending-text"></div>
      <div class="ending-actions">
        <button id="btn-back-title" class="title-btn">タイトルへ戻る</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
